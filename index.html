<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>몬스터 클리커 게임 - 일러스트 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 드래그 및 텍스트 선택 방지 (클릭 게임에 필수) */
        body { user-select: none; -webkit-user-select: none; }
        
        /* 몬스터 피격 애니메이션 */
        @keyframes hit {
            0% { transform: scale(1) rotate(0deg); filter: brightness(1) drop-shadow(0 0 0 rgba(255, 0, 0, 0)); }
            50% { transform: scale(0.9) rotate(-3deg); filter: brightness(1.8) drop-shadow(0 0 20px rgba(255, 0, 0, 0.8)); }
            100% { transform: scale(1) rotate(0deg); filter: brightness(1) drop-shadow(0 0 0 rgba(255, 0, 0, 0)); }
        }
        .animate-hit { animation: hit 0.1s ease-in-out; }

        /* 데미지 텍스트 애니메이션 */
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-70px) scale(1.6); }
        }
        .damage-text {
            position: absolute;
            color: #ff4444;
            font-weight: 800;
            font-size: 1.8rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 2px 2px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000;
            z-index: 10;
        }

        /* 슬래쉬 이펙트 애니메이션 */
        @keyframes slashAnim {
            0% { transform: translate(-50%, -50%) scale(0.2) rotate(var(--angle, -45deg)); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1.5) rotate(var(--angle, -45deg)); opacity: 0; }
        }
        .slash-effect {
            position: absolute;
            width: 150px;
            height: 8px;
            background: linear-gradient(90deg, transparent, #ffffff, transparent);
            box-shadow: 0 0 15px #ffffff, 0 0 20px #eab308;
            border-radius: 50%;
            pointer-events: none;
            animation: slashAnim 0.15s ease-out forwards;
            z-index: 20;
        }

        /* 로딩 스피너 애니메이션 */
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 5;
        }
        @keyframes spin {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .is-loading .loader { display: block; }
        .is-loading img { opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-950 text-white h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-gray-900 p-4 shadow-lg flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-4">
            <div class="text-3xl font-extrabold text-yellow-400">💰 <span id="moneyDisplay">0</span> G</div>
        </div>
        <div class="text-right">
            <div class="text-2xl font-bold text-blue-300">무기: +<span id="weaponLevelDisplay">0</span></div>
            <div class="text-sm text-gray-400">클릭/스페이스 데미지: <span id="damageDisplay" class="text-white font-bold">1</span></div>
        </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center relative p-6">
        
        <div class="text-3xl font-extrabold mb-8 text-gray-300 tracking-wider">
            스테이지 <span id="stageDisplay" class="text-white">1</span>
        </div>

        <div class="w-full max-w-xl mb-3 flex justify-between text-base font-bold">
            <span class="text-red-400">HP</span>
            <span><span id="currentHpDisplay">100</span> / <span id="maxHpDisplay">100</span></span>
        </div>
        <div class="w-full max-w-xl h-10 bg-gray-800 rounded-full border-4 border-gray-700 overflow-hidden mb-12 shadow-inner relative">
            <div id="hpBar" class="h-full bg-gradient-to-r from-red-700 to-red-400 w-full transition-all duration-75"></div>
        </div>

        <div id="monsterContainer" class="relative cursor-pointer select-none">
            <div class="loader" id="monsterLoader"></div>
            <img id="monsterImage" src="" class="h-64 w-64 transform transition-transform hover:scale-105 active:scale-95 drop-shadow-2xl object-contain">
        </div>

        <!-- 우측 하단 무기 표시 영역 -->
        <div class="absolute bottom-4 right-4 flex flex-col items-center bg-gray-900 p-3 rounded-xl border-2 border-gray-700 shadow-2xl z-30">
            <div class="text-blue-300 font-bold mb-2">무기: +<span id="weaponUiLevelDisplay">0</span></div>
            <div id="weaponImageContainer" class="relative w-24 h-24 bg-gray-800 rounded-lg flex items-center justify-center border border-gray-600">
                <div class="loader" id="weaponLoader"></div>
                <img id="weaponImage" src="" class="max-w-full max-h-full object-contain drop-shadow-lg">
            </div>
        </div>
    </main>

    <footer class="bg-gray-900 border-t-2 border-gray-800 p-8 flex flex-col items-center">
        <div id="logMessage" class="text-gray-300 h-8 mb-6 font-bold text-lg text-center">
            [테스트 보너스 100G 지급] 강화를 누르거나 몬스터를 공격하세요!
        </div>

        <button id="upgradeBtn" class="bg-blue-700 hover:bg-blue-500 active:bg-blue-800 disabled:bg-gray-700 disabled:cursor-not-allowed text-white font-extrabold py-4 px-10 rounded-2xl shadow-xl transition-colors w-full max-w-md flex flex-col items-center border-2 border-blue-500">
            <span class="text-xl" id="upgradeBtnText">무기 강화하기</span>
            <span class="text-sm font-medium text-blue-200 mt-1">비용: <span id="upgradeCostDisplay">10</span> G</span>
        </button>

        <div class="flex gap-6 mt-6 text-sm font-bold bg-black px-6 py-3 rounded-lg border border-gray-700">
            <span class="text-green-400">성공: <span id="probSuccess">50</span>%</span>
            <span class="text-yellow-400">유지: <span id="probFail">35</span>%</span>
            <span class="text-red-400">파괴: <span id="probDestroy">15</span>%</span>
        </div>
    </footer>

    <script>
        // --- 1. 게임 상태 및 설정 ---
        
        // UI를 차단하는 로딩 상태 (현재 화면의 이미지)
        let isMonsterLoading = false;
        let isWeaponLoading = false;

        // 사전 로딩된 이미지들을 저장하는 메모리 캐시
        const imageCache = {
            monsters: {}, 
            weapons: {},  
            fetching: { monsters: {}, weapons: {} } 
        };
        const PRELOAD_BUFFER = 3;

        // 초기 설정값
        let money = 100;
        let weaponLevel = 0;
        const MAX_WEAPON_LEVEL = 14;
        let damage = 1;
        
        let stage = 1;
        let maxHp = 100;
        let currentHp = 100;
        let upgradeCost = 10;

        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        const upgradeStats = [
            { success: 90, fail: 10, destroy: 0 },   // 0
            { success: 85, fail: 15, destroy: 0 },   // 1
            { success: 80, fail: 20, destroy: 0 },   // 2
            { success: 70, fail: 25, destroy: 5 },   // 3
            { success: 60, fail: 30, destroy: 10 },  // 4
            { success: 50, fail: 35, destroy: 15 },  // 5
            { success: 45, fail: 35, destroy: 20 },  // 6
            { success: 40, fail: 35, destroy: 25 },  // 7
            { success: 35, fail: 35, destroy: 30 },  // 8
            { success: 30, fail: 30, destroy: 40 },  // 9
            { success: 25, fail: 30, destroy: 45 },  // 10
            { success: 20, fail: 25, destroy: 55 },  // 11
            { success: 15, fail: 25, destroy: 60 },  // 12
            { success: 5,  fail: 20, destroy: 75 },  // 13
            { success: 0,  fail: 0,  destroy: 0 }    // 14 MAX
        ];

        // --- 2. HTML 요소 가져오기 ---
        const ui = {
            money: document.getElementById('moneyDisplay'),
            weaponLevel: document.getElementById('weaponLevelDisplay'),
            damage: document.getElementById('damageDisplay'),
            stage: document.getElementById('stageDisplay'),
            currentHp: document.getElementById('currentHpDisplay'),
            maxHp: document.getElementById('maxHpDisplay'),
            hpBar: document.getElementById('hpBar'),
            monster: document.getElementById('monsterImage'),
            monsterContainer: document.getElementById('monsterContainer'),
            upgradeBtn: document.getElementById('upgradeBtn'),
            upgradeCost: document.getElementById('upgradeCostDisplay'),
            upgradeBtnText: document.getElementById('upgradeBtnText'),
            log: document.getElementById('logMessage'),
            weaponImage: document.getElementById('weaponImage'),
            weaponContainer: document.getElementById('weaponImageContainer'),
            weaponUiLevel: document.getElementById('weaponUiLevelDisplay'),
            probSuccess: document.getElementById('probSuccess'),
            probFail: document.getElementById('probFail'),
            probDestroy: document.getElementById('probDestroy')
        };

        // --- 3. 화면 업데이트 로직 ---
        function updateUI() {
            ui.money.textContent = money;
            ui.weaponLevel.textContent = weaponLevel === MAX_WEAPON_LEVEL ? "MAX" : weaponLevel;
            ui.weaponUiLevel.textContent = weaponLevel === MAX_WEAPON_LEVEL ? "MAX" : weaponLevel;
            ui.damage.textContent = damage;
            ui.stage.textContent = stage;
            ui.currentHp.textContent = Math.max(0, currentHp);
            ui.maxHp.textContent = maxHp;
            
            if (weaponLevel >= MAX_WEAPON_LEVEL) {
                ui.upgradeCost.textContent = "-";
                ui.probSuccess.textContent = "0";
                ui.probFail.textContent = "0";
                ui.probDestroy.textContent = "0";
                ui.upgradeBtn.disabled = true;
                ui.upgradeBtnText.textContent = "최대 레벨 달성!";
            } else {
                ui.upgradeCost.textContent = upgradeCost;
                const stats = upgradeStats[weaponLevel];
                ui.probSuccess.textContent = stats.success;
                ui.probFail.textContent = stats.fail;
                ui.probDestroy.textContent = stats.destroy;
                ui.upgradeBtnText.textContent = "무기 강화하기";
                
                ui.upgradeBtn.disabled = money < upgradeCost || isWeaponLoading;
            }

            const hpPercent = (currentHp / maxHp) * 100;
            ui.hpBar.style.width = `${Math.max(0, hpPercent)}%`;
        }

        function showLog(message, colorClass = 'text-gray-300') {
            ui.log.textContent = message;
            ui.log.className = `h-8 mb-6 font-bold text-lg text-center ${colorClass}`;
        }

        // --- 4. 백그라운드 사전 생성 및 캐싱 로직 (오픈소스 API 적용) ---
        
        async function fetchMonsterImage(stageIndex) {
            if (imageCache.monsters[stageIndex]) return imageCache.monsters[stageIndex];
            if (imageCache.fetching.monsters[stageIndex]) return imageCache.fetching.monsters[stageIndex];
            
            // Robohash API: 별도 키 없이 무작위 몬스터 이미지를 제공합니다. (set2=monsters)
            const url = `https://robohash.org/monster_stage_${stageIndex}?set=set2&size=300x300`;

            const fetchPromise = new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    imageCache.monsters[stageIndex] = url;
                    delete imageCache.fetching.monsters[stageIndex];
                    resolve(url);
                };
                img.onerror = () => resolve(url);
                img.src = url;
            });

            imageCache.fetching.monsters[stageIndex] = fetchPromise;
            return fetchPromise;
        }

        async function fetchWeaponImage(level) {
            if (level > MAX_WEAPON_LEVEL) return null;
            if (imageCache.weapons[level]) return imageCache.weapons[level];
            if (imageCache.fetching.weapons[level]) return imageCache.fetching.weapons[level];

            // Robohash API: 무기 아이콘 대신 무작위 로봇 일러스트 제공 (set1=robots)
            const url = `https://robohash.org/weapon_level_${level}?set=set1&size=150x150`;
            
            const fetchPromise = new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    imageCache.weapons[level] = url;
                    delete imageCache.fetching.weapons[level];
                    resolve(url);
                };
                img.onerror = () => resolve(url);
                img.src = url;
            });

            imageCache.fetching.weapons[level] = fetchPromise;
            return fetchPromise;
        }

        async function preloadMonsters(startStage) {
            for (let i = 1; i <= PRELOAD_BUFFER; i++) {
                fetchMonsterImage(startStage + i).catch(e => console.log(e));
            }
        }

        async function preloadWeapons(startLevel) {
            for (let i = 1; i <= PRELOAD_BUFFER; i++) {
                if (startLevel + i <= MAX_WEAPON_LEVEL) {
                    fetchWeaponImage(startLevel + i).catch(e => console.log(e));
                }
            }
        }

        // --- 5. 화면 적용 로직 ---
        
        async function applyMonster(stageIndex) {
            if (!imageCache.monsters[stageIndex]) {
                isMonsterLoading = true;
                ui.monsterContainer.classList.add('is-loading');
                showLog(`몬스터를 불러오는 중입니다...`, 'text-blue-300');
            }

            const imgSrc = await fetchMonsterImage(stageIndex);
            
            ui.monster.src = imgSrc;
            ui.monsterContainer.classList.remove('is-loading');
            isMonsterLoading = false;
            showLog(`스테이지 ${stage} 시작! 몬스터를 공격하세요.`, 'text-white');

            preloadMonsters(stageIndex);
        }

        async function applyWeapon(level) {
            if (!imageCache.weapons[level]) {
                isWeaponLoading = true;
                ui.weaponContainer.classList.add('is-loading');
                updateUI(); 
            }

            const imgSrc = await fetchWeaponImage(level);
            
            ui.weaponImage.src = imgSrc;
            ui.weaponContainer.classList.remove('is-loading');
            isWeaponLoading = false;
            updateUI(); 

            preloadWeapons(level);
        }

        // --- 6. 전투 및 강화 로직 ---
        function attack(e) {
            if (isMonsterLoading || currentHp <= 0) return;

            currentHp -= damage;
            
            playHitEffect();
            showDamageText(e);
            showSlashEffect(e);
            playSlashSound();

            if (currentHp <= 0) {
                killMonster();
            } else {
                updateUI();
            }
        }

        function playHitEffect() {
            ui.monster.classList.remove('animate-hit');
            void ui.monster.offsetWidth; 
            ui.monster.classList.add('animate-hit');
        }

        function showDamageText(e) {
            const rect = ui.monsterContainer.getBoundingClientRect();
            let clientX = rect.left + rect.width / 2, clientY = rect.top + rect.height / 2;
            
            if (e && (e.clientX || (e.touches && e.touches[0]))) {
                clientX = e.clientX || e.touches[0].clientX;
                clientY = e.clientY || e.touches[0].clientY;
            }

            const damageEl = document.createElement('div');
            damageEl.textContent = `-${damage}`;
            damageEl.className = 'damage-text';
            
            damageEl.style.left = `${clientX - rect.left + (Math.random() - 0.5) * 50}px`;
            damageEl.style.top = `${clientY - rect.top + (Math.random() - 0.5) * 30}px`;
            ui.monsterContainer.appendChild(damageEl);

            setTimeout(() => damageEl.remove(), 800);
        }

        function showSlashEffect(e) {
            const rect = ui.monsterContainer.getBoundingClientRect();
            let clientX = rect.left + rect.width / 2, clientY = rect.top + rect.height / 2;
            
            if (e && (typeof e.clientX !== 'undefined' || (e.touches && e.touches[0]))) {
                clientX = typeof e.clientX !== 'undefined' ? e.clientX : e.touches[0].clientX;
                clientY = typeof e.clientY !== 'undefined' ? e.clientY : e.touches[0].clientY;
            }

            const slashEl = document.createElement('div');
            slashEl.className = 'slash-effect';
            slashEl.style.left = `${clientX - rect.left}px`;
            slashEl.style.top = `${clientY - rect.top}px`;
            slashEl.style.setProperty('--angle', `${Math.random() * 360}deg`);

            ui.monsterContainer.appendChild(slashEl);
            setTimeout(() => slashEl.remove(), 150);
        }

        function playSlashSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.1);
        }

        function killMonster() {
            const reward = 5 + (stage * 3);
            money += reward;
            showLog(`⚔️ 스테이지 처치! +${reward} G 획득`, 'text-yellow-400');

            stage++;
            maxHp = Math.floor(maxHp * 1.4);
            currentHp = maxHp;

            updateUI();
            
            applyMonster(stage - 1);
        }

        function tryUpgrade() {
            if (money < upgradeCost || weaponLevel >= MAX_WEAPON_LEVEL || isWeaponLoading) return;

            money -= upgradeCost;
            const stats = upgradeStats[weaponLevel];
            const roll = Math.floor(Math.random() * 100);

            if (roll < stats.success) {
                weaponLevel++;
                showLog(`✨ 강화 성공! 무기가 +${weaponLevel}(이)가 되었습니다!`, 'text-green-400');
                applyWeapon(weaponLevel);
            } else if (roll < stats.success + stats.fail) {
                showLog(`💦 강화 실패... 다행히 무기는 유지되었습니다.`, 'text-yellow-400');
            } else {
                weaponLevel = 0;
                showLog(`💥 앗! 무기가 파괴되어 레벨이 0으로 초기화되었습니다!`, 'text-red-500');
                applyWeapon(weaponLevel);
            }

            damage = 1 + (weaponLevel * 3) + Math.floor(Math.pow(weaponLevel, 1.6));
            upgradeCost = 10 + (weaponLevel * 20) + Math.floor(Math.pow(weaponLevel, 2.5));

            updateUI();
        }

        // --- 7. 이벤트 리스너 ---
        ui.monsterContainer.addEventListener('mousedown', attack);
        ui.monsterContainer.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            attack(e);
        }, { passive: false });

        document.addEventListener('keydown', (e) => {
            if (e.repeat) return; 
            if (e.code === 'Space') {
                e.preventDefault(); 
                attack(null); 
            }
        });

        ui.upgradeBtn.addEventListener('click', tryUpgrade);

        // --- 8. 초기 실행 ---
        updateUI();
        
        applyMonster(0); 
        applyWeapon(0); 

    </script>
</body>
</html>
